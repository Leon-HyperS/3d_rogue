<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Relic Run</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #090d18;
    }

    body {
      display: grid;
      place-items: stretch;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      padding: 16px;
      color: #f4f7ff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.65);
    }

    .panel {
      align-self: flex-start;
      min-width: 280px;
      max-width: 360px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      background: rgba(7, 12, 24, 0.68);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.05;
    }

    .subtitle {
      margin: 0 0 12px;
      color: #b6c0db;
      font-size: 13px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0;
      font-size: 14px;
    }

    .bar {
      width: 100%;
      height: 10px;
      margin-top: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #67f0a6, #f7d961);
      transform-origin: left center;
    }

    #prompt {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      min-width: 220px;
      text-align: center;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(8, 12, 22, 0.86);
      color: #f7fbff;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    #prompt.visible {
      opacity: 1;
    }

    #banner {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    #banner.visible {
      opacity: 1;
    }

    #bannerCard {
      width: min(92vw, 540px);
      padding: 24px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(6, 10, 20, 0.88);
      text-align: center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    #bannerTitle {
      margin: 0;
      font-size: 36px;
    }

    #bannerText {
      margin: 10px 0 0;
      color: #cad3eb;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="panel">
      <h1>Relic Run</h1>
      <p class="subtitle">Collect the key, pull the lever, open the gate, reach the chest.</p>
      <div class="stat-row"><span>Objective</span><strong id="objective">Loading...</strong></div>
      <div class="stat-row"><span>Timer</span><strong id="timer">--</strong></div>
      <div class="stat-row"><span>Stamina</span><strong id="staminaLabel">--</strong></div>
      <div class="bar"><div id="staminaBar" class="bar-fill"></div></div>
      <div class="stat-row"><span>Status</span><strong id="status">Loading assets</strong></div>
      <div class="stat-row"><span>Controls</span><strong>WASD / Shift / E / R</strong></div>
    </div>
  </div>

  <div id="prompt"></div>

  <div id="banner">
    <div id="bannerCard">
      <h2 id="bannerTitle">Ready</h2>
      <p id="bannerText"></p>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./game.js"></script>
</body>
</html>
